PACKAGE_NAME="uvcvideo-privacy"
PACKAGE_VERSION="1.1.1-privacy1"

# Builds the same "uvcvideo" module name as the in-tree driver, on purpose:
# DKMS installs into /lib/modules/$kernelver/updates/dkms/, which the
# standard Debian/Ubuntu module search order checks before the in-tree
# kernel/ directory, so modprobe/hotplug reliably resolve to this build
# instead of stock - see docs/DESIGN.md for why this was chosen over
# shipping under a different module name.
BUILT_MODULE_NAME[0]="uvcvideo"
BUILT_MODULE_LOCATION[0]="."
DEST_MODULE_LOCATION[0]="/updates/dkms"

# Reuses the existing Makefile's kernel-build-tree invocation; KDIR is a
# plain (non-override) assignment there, so this command-line value takes
# precedence, letting dkms target a kernel other than the one currently
# running (needed for the postinst-triggered rebuild during a kernel
# upgrade, before the new kernel has been booted).
MAKE[0]="make KDIR=/lib/modules/${kernelver}/build"
CLEAN[0]="make KDIR=/lib/modules/${kernelver}/build clean"

# Copies privacy_stubs/*.jpg/*.yuyv into /lib/firmware/uvc_privacy/ after
# every (re)install - kernel-version-independent, so redundant copies on a
# kernel-upgrade rebuild are harmless.
POST_INSTALL="dkms-postinstall.sh"

# Rebuild automatically whenever a new kernel package is installed - this
# is what makes the driver survive kernel updates without manual action.
AUTOINSTALL="yes"
